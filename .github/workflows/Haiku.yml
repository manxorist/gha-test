name: Haiku Makefile

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:

    strategy:
      fail-fast: false
      matrix:
        include:
          - { version: 'r1beta5', deps: sys   }
          - { version: 'r1beta5', deps: local }
          - { version: 'r1beta5', deps: small }

    concurrency:
      group: ${{github.ref}}-${{github.workflow}}-${{matrix.version}}-${{matrix.deps}}
      cancel-in-progress: true

    runs-on: ubuntu-24.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Startup VM
      uses: cross-platform-actions/action@v1.1.0
      with:
        architecture: x86_64
        memory: 4G
        operating_system: haiku
        version: ${{matrix.version}}
        shell: bash
        sync_files: false
    - name: Sync files to VM
      shell: cpa.sh {0} --sync-files runner-to-vm
      run: true
    - name: Update system
      shell: cpa.sh {0} --sync-files none
      run: |
        pkgman refresh
        pkgman full-sync -y
    - name: Reboot VM
      shell: cpa.sh {0} --sync-files none --reboot
      run: true
    - name: Install dependencies
      shell: cpa.sh {0} --sync-files none
      run: |
        pkgman refresh
        pkgman install -y subversion git perl gawk make pkgconfig mpg123_devel libogg_devel libvorbis_devel flac_devel libsndfile_devel portaudio_devel libsdl2_devel autoconf autoconf_archive libtool libtool_libltdl doxygen help2man
    - name: Reboot VM
      shell: cpa.sh {0} --sync-files none --reboot
      run: true
    - name: Build
      shell: cpa.sh {0} --sync-files none
      run: |
        echo $SHELL
    - name: Test
      shell: cpa.sh {0} --sync-files none
      run: |
        pwd
