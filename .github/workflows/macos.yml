
name: macOS Makefile

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { host: macos-26, compiler: '26.5', arch: ''    , target: ''     , deps: sys  , check: true , ancient: false }
          - { host: macos-26, compiler: '26.4', arch: ''    , target: ''     , deps: sys  , check: true , ancient: false }
          - { host: macos-26, compiler: '26.3', arch: ''    , target: ''     , deps: sys  , check: true , ancient: false }
          - { host: macos-26, compiler: '26.2', arch: ''    , target: ''     , deps: sys  , check: true , ancient: false }
          - { host: macos-26, compiler: '26.1', arch: ''    , target: ''     , deps: sys  , check: true , ancient: false }
          - { host: macos-26, compiler: '26.0', arch: ''    , target: ''     , deps: sys  , check: true , ancient: false }
          - { host: macos-15, compiler: '16.4', arch: ''    , target: ''     , deps: sys  , check: true , ancient: false }
          - { host: macos-15, compiler: '16.3', arch: ''    , target: ''     , deps: sys  , check: true , ancient: false }
          - { host: macos-15, compiler: '16.2', arch: ''    , target: ''     , deps: sys  , check: true , ancient: false }
          - { host: macos-15, compiler: '16.1', arch: ''    , target: ''     , deps: sys  , check: true , ancient: false }
          - { host: macos-15, compiler: '16.0', arch: ''    , target: ''     , deps: sys  , check: true , ancient: false }
          - { host: macos-14, compiler: '15.4', arch: ''    , target: ''     , deps: sys  , check: true , ancient: false }
          - { host: macos-14, compiler: '15.3', arch: x86_64, target: '10.13', deps: local, check: true , ancient: false }
          - { host: macos-14, compiler: '15.2', arch: x86_64, target: '10.13', deps: local, check: true , ancient: false }
          - { host: macos-14, compiler: '15.1', arch: x86_64, target: '10.13', deps: local, check: true , ancient: false }
          - { host: macos-14, compiler: '15.0', arch: x86_64, target: '10.13', deps: local, check: true , ancient: false }
    concurrency:
      group: ${{github.ref}}-${{github.workflow}}-${{matrix.host}}-${{matrix.compiler}}-${{matrix.arch}}-${{matrix.target}}-${{matrix.deps}}-r2
      cancel-in-progress: true
    runs-on: ${{matrix.host}}
    steps:
    - uses: actions/checkout@v4
    - name: update Homebrew
      run: brew update
    - name: fixup Homebrew xcodes
      run: brew install --build-from-source xcodes
    - name: fixup GitHub Homebrew ruby breakage
      if: ${{ matrix.host == 'macos-14' }}
      run: brew unlink ruby@3.3 && brew link --overwrite ruby@3.3 && brew unlink ruby@3.3 && brew upgrade ruby@3.3
    - name: fixup GitHub Homebrew ruby breakage
      if: ${{ matrix.host == 'macos-15' }}
      run: brew unlink ruby@3.3 && brew link --overwrite ruby@3.3 && brew unlink ruby@3.3 && brew upgrade ruby@3.3
    - name: upgrade packages
      run: brew upgrade
    - name: install dependencies
      run: brew install p7zip help2man doxygen autoconf autoconf-archive automake libtool mpg123 libogg libvorbis portaudio flac libsndfile sdl2
    - name: selecting Xcode version
      run: sudo xcode-select --switch /Applications/Xcode_${{matrix.compiler}}.app
